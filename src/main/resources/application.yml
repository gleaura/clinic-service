server:
  port: 8090

spring:
  application:
    name: clinic-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:46.225.97.71}:${DB_PORT:5432}/postgres?currentSchema=clinic
    username: ${DB_USER:clinic_app}
    password: ${DB_PASSWORD:clinic_app}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: false
  mvc:
    problemdetails:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET:5rDmTtqp7KKanOl22OzBh6lC509zs1uuoLoiJkf97gAveb3m1s8SvRn1ugaxvbSm+lwCEn3FG7oRp9JXv58/Dg==}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.gleaura.clinic.service: DEBUG
    org.hibernate.SQL: DEBUG
